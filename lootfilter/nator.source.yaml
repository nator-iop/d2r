# ═══════════════════════════════════════════════════════════════
# Other rules — category-based, rares, disabled, hide
# ═══════════════════════════════════════════════════════════════

other_rules:
  # ── Enabled ──

  - name: Warlock Class Items
    enabled: true
    ruleType: show
    filterEtherealSocketed: false
    equipmentRarity: [rare, set, unique]
    equipmentCategory: [warlo]

  - name: Accessories
    enabled: true
    ruleType: show
    filterEtherealSocketed: false
    equipmentRarity: [rare, unique]
    equipmentCategory: [acce, jewel]

  - name: Set Amulets
    enabled: true
    ruleType: show
    filterEtherealSocketed: false
    equipmentRarity: [set]
    equipmentCategory: [amule]

  - name: Rare Diadems
    enabled: true
    ruleType: show
    filterEtherealSocketed: false
    equipmentRarity: [rare]
    items: [Diadem]

  # ── Farming (disabled) ──

  - name: Farm Uni/Set Elite
    enabled: false
    ruleType: show
    filterEtherealSocketed: false
    equipmentRarity: [unique, set]
    equipmentQuality: [elite]
    equipmentCategory: [acce, armo, weap, jewel]

  - name: Farm Bases Elite
    enabled: false
    ruleType: show
    filterEtherealSocketed: true
    equipmentQuality: [elite]

  - name: Farm Magic Jewels
    enabled: false
    ruleType: show
    filterEtherealSocketed: false
    equipmentRarity: [magic]
    equipmentCategory: [jewel]

  - name: Farm Magic Rings
    enabled: false
    ruleType: show
    filterEtherealSocketed: false
    equipmentRarity: [magic]
    equipmentCategory: [rings]

  - name: Farm Potions
    enabled: false
    ruleType: show
    filterEtherealSocketed: false
    itemCode: [hp2, hp3, hp4, hp5, mp2, mp3, mp4, mp5, rvs, wms, yps, vps]

  # ── Pre-BiS / leveling (disabled) ──

  - name: Pre-BiS Unique Normal
    enabled: false
    ruleType: show
    filterEtherealSocketed: false
    equipmentRarity: [unique]
    equipmentQuality: [normal]
    equipmentItemCode: [vgl, tbt, dgr, skp, mbl, bld]

  - name: Pre-BiS Unique Except
    enabled: false
    ruleType: show
    filterEtherealSocketed: false
    equipmentRarity: [unique]
    equipmentQuality: [exceptional]
    equipmentItemCode: [xkp, xap, xml, xrs, 9fc, 9wn, xpk]

  - name: Pre-BiS Bases Normal
    enabled: false
    ruleType: show
    filterEtherealSocketed: true
    equipmentQuality: [normal]
    equipmentItemCode: [fla]

  - name: Pre-BiS Bases Except
    enabled: false
    ruleType: show
    filterEtherealSocketed: true
    equipmentQuality: [exceptional]
    equipmentItemCode: [xsk, xh9, xea, xrs, xtp]

  - name: Lvl Bases Normal
    enabled: false
    ruleType: show
    filterEtherealSocketed: true
    equipmentQuality: [normal]
    equipmentItemCode: [crs, bsd, lrg, kit, pax, hal, wsc, scy]

  - name: Lvl Bases Exceptional
    enabled: false
    ruleType: show
    filterEtherealSocketed: true
    equipmentQuality: [exceptional]
    equipmentItemCode: [9vo, 9s8, 9pa, 9h9, 9wc]

  # ── Hide All (must be last) ──

  - name: Hide All
    enabled: true
    ruleType: hide
    filterEtherealSocketed: true
    equipmentRarity: [rare, lowQuality, set, unique, magic, hiQuality, normal]
    equipmentQuality: [normal, exceptional, elite]
    equipmentCategory: [jewel, rings, armo, weap, amule]
    itemCategory: [ammo, scrlt, keysr]
    itemCode: [hp2, mp3, mp4, wms, hp5, hp1, rvs, hp4, mp1, mp5, mp2, yps, vps, hp3]
    goldFilterValue: 5000
